CONFIG_GPIO=y
CONFIG_LOG=y

# Enable I2C and Sensor subsystems
CONFIG_I2C=y
CONFIG_SENSOR=y

# C++ Support
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# Floating point printing support
CONFIG_CBPRINTF_FP_SUPPORT=y

# Enable WiFi
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_DHCPV4=y

# Networking (IPv4 only, explicitly disable IPv6 to prevent WAN routing timeouts)
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y

# Logging
CONFIG_NET_LOG=y
CONFIG_WIFI_LOG_LEVEL_INF=y
CONFIG_NET_L2_WIFI_MGMT_LOG_LEVEL_INF=y
CONFIG_LOG_OUTPUT_FORMAT_ISO8601_TIMESTAMP=y
CONFIG_POSIX_C_LANG_SUPPORT_R=y

# Networking Sockets
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_ADDITIONAL_QUERIES=2

# Configure static DNS servers to bypass potential DHCP DNS server issues
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"
CONFIG_DNS_SERVER2="1.1.1.1"

# WiFi Configuration placeholders
CONFIG_APP_WIFI_SSID="your-ssid-here"
CONFIG_APP_WIFI_PASSWORD="your-password-here"

# Application stack and heap allocations (optimized to prevent ESP32-C6 SRAM exhaustion)
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=65536


# Enable MQTT and JSON parsing support
CONFIG_MQTT_LIB=y
CONFIG_JSON_LIBRARY=y
CONFIG_JSON_LIBRARY_FP_SUPPORT=y

# TLS Configuration
CONFIG_MQTT_LIB_TLS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y

# MbedTLS Cipher and Key Exchange Configurations for RSA and ECDSA
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=2
CONFIG_MBEDTLS_DECLARE_PRIVATE_IDENTIFIERS=y
CONFIG_MBEDTLS_PK_WRITE_C=y
CONFIG_MBEDTLS_PSA_CRYPTO_LEGACY_RNG=y
CONFIG_MBEDTLS_CTR_DRBG_C=y

# Enable ECDSA ciphersuites and key exchanges in MbedTLS (required for Hosted Mender ECDSA certificates)
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256=y

# Restore TLS input record buffer 4KB -> 16KB to fit Let's Encrypt certificate chains
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384

# Allocate dedicated memory for MbedTLS (optimized to prevent ESP32-C6 SRAM exhaustion)
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=65536


# MQTT TLS Credentials Default Placeholders
CONFIG_APP_MQTT_USERNAME="device_user"
CONFIG_APP_MQTT_PASSWORD="device_pass"
CONFIG_APP_MQTT_BROKER_HOST="127.0.0.1"
CONFIG_APP_MQTT_BROKER_PORT=1883

# Enable MCUboot integration
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_MANAGER=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Enable Mender Client
CONFIG_MENDER_MCU_CLIENT=y
CONFIG_MENDER_SERVER_HOST_EU=y
CONFIG_MENDER_CLIENT_UPDATE_POLL_INTERVAL=3600
CONFIG_MENDER_CLIENT_INVENTORY_REFRESH_INTERVAL=604800

CONFIG_MENDER_STORAGE_PARTITION_STORAGE_PARTITION=y
CONFIG_MENDER_ARTIFACT_GENERATE=n

# Disable TLS Peer Verification for testing/local development
CONFIG_MENDER_NET_TLS_PEER_VERIFY=0

# PSA Cryptography configurations for ECDSA / Mender signature support
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_ALG_SHA_256=y

# Mender TLS CA tags (avoiding conflict with MQTT tag 1)
CONFIG_MENDER_NET_CA_CERTIFICATE_TAG_PRIMARY=3
CONFIG_MENDER_NET_CA_CERTIFICATE_TAG_SECONDARY=4

# Increase max TLS credentials to accommodate MQTT, primary/secondary Mender CAs, and dormant recovery CAs
CONFIG_TLS_MAX_CREDENTIALS_NUMBER=8

# Network packet and buffer allocations to support concurrent TLS connections
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=80
CONFIG_NET_BUF_TX_COUNT=80

# Mender dedicated work queue config to prevent stack overflows during heavy TLS handshakes
CONFIG_MENDER_SCHEDULER_SEPARATE_WORK_QUEUE=y
CONFIG_MENDER_SCHEDULER_WORK_QUEUE_STACK_SIZE=12

# Stack sizes and event queue configurations to prevent stack overflows
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=32
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_RX_STACK_SIZE=4096
CONFIG_NET_TX_STACK_SIZE=4096

# Enable SNTP client for secure TLS time validation
CONFIG_SNTP=y
