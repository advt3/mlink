CONFIG_GPIO=y
CONFIG_LOG=y

# Enable I2C and Sensor subsystems
CONFIG_I2C=y
CONFIG_SENSOR=y

# C++ Support
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# Floating point printing support
CONFIG_CBPRINTF_FP_SUPPORT=y

# Enable WiFi
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_DHCPV4=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y

# Logging
CONFIG_NET_LOG=y
CONFIG_WIFI_LOG_LEVEL_INF=y
CONFIG_NET_L2_WIFI_MGMT_LOG_LEVEL_INF=y

# Networking Sockets
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_ADDITIONAL_QUERIES=2

# WiFi Configuration placeholders
CONFIG_APP_WIFI_SSID="your-ssid-here"
CONFIG_APP_WIFI_PASSWORD="your-password-here"

# Application stack and heap allocations
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=196608

# Enable MQTT and JSON parsing support
CONFIG_MQTT_LIB=y
CONFIG_JSON_LIBRARY=y
CONFIG_JSON_LIBRARY_FP_SUPPORT=y

# TLS Configuration
CONFIG_MQTT_LIB_TLS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256=y
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=2

# Restore TLS input record buffer 4KB -> 16KB to fit Let's Encrypt certificate chains
CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096

# Allocate dedicated memory for MbedTLS
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=65536

# MQTT TLS Credentials Default Placeholders
CONFIG_APP_MQTT_USERNAME="device_user"
CONFIG_APP_MQTT_PASSWORD="device_pass"
CONFIG_APP_MQTT_BROKER_HOST="127.0.0.1"
CONFIG_APP_MQTT_BROKER_PORT=1883



