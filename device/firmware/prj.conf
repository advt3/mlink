CONFIG_GPIO=y
CONFIG_LOG=y

# Enable I2C and Sensor subsystems
CONFIG_I2C=y
CONFIG_SENSOR=y

# C++ Support
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# Floating point printing support
CONFIG_CBPRINTF_FP_SUPPORT=y

# Enable WiFi
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_DHCPV4=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y

# Logging
CONFIG_NET_LOG=y
CONFIG_WIFI_LOG_LEVEL_INF=y
CONFIG_NET_L2_WIFI_MGMT_LOG_LEVEL_INF=y

# Networking Sockets
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_TEST_RANDOM_GENERATOR=y

# WiFi Configuration placeholders
CONFIG_APP_WIFI_SSID="your-ssid-here"
CONFIG_APP_WIFI_PASSWORD="your-password-here"

# Application stack and heap allocations
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=65536

# Enable MQTT and JSON parsing support
CONFIG_MQTT_LIB=y
CONFIG_JSON_LIBRARY=y
CONFIG_JSON_LIBRARY_FP_SUPPORT=y



