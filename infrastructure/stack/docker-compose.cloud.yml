services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.mqtts.address=:8883"
      # Let's Encrypt ACME Configuration
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${LE_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "8883:8883"
    volumes:
      - ../.persistence/letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.1-alpine
    container_name: mosquitto-broker
    volumes:
      - ./mosquitto/config/mosquitto.cloud.conf:/mosquitto/config/mosquitto.conf:ro
      - ../.persistence/password_file:/mosquitto/config/password_file:ro
      - ../.persistence/mosquitto/data:/mosquitto/data
      - ../.persistence/mosquitto/log:/mosquitto/log
    expose:
      - "1883"
    labels:
      - "traefik.enable=true"
      - "traefik.tcp.routers.mqtt.rule=HostSNI(`${MQTT_DOMAIN}`)"
      - "traefik.tcp.routers.mqtt.entrypoints=mqtts"
      - "traefik.tcp.routers.mqtt.tls=true"
      - "traefik.tcp.routers.mqtt.tls.certresolver=myresolver"
      - "traefik.tcp.services.mqtt.loadbalancer.server.port=1883"
    restart: unless-stopped

  victoriametrics:
    container_name: victoriametrics
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    volumes:
      - ../.persistence/victoriametrics-data:/storage
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
    restart: unless-stopped

  telegraf:
    image: telegraf:alpine
    container_name: telegraf
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/hostfs:ro
    environment:
      - HOST_MOUNT_PREFIX=/hostfs
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
    depends_on:
      - mosquitto
      - victoriametrics
    restart: unless-stopped

  vmalert:
    container_name: vmalert
    image: victoriametrics/vmalert:latest
    depends_on:
      - victoriametrics
      - alertmanager
    ports:
      - "8880:8880"
    volumes:
      - ./vmalert/rules.yml:/etc/alerts/rules.yml
    command:
      - "--datasource.url=http://victoriametrics:8428"
      - "--notifier.url=http://alertmanager:9093"
      - "--rule=/etc/alerts/rules.yml"
    restart: unless-stopped

  alertmanager:
    container_name: alertmanager
    image: prom/alertmanager:latest
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ../.persistence/telegram_token:/etc/alertmanager/telegram_token:ro
      - ../.persistence/alertmanager:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    restart: unless-stopped
